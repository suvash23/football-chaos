name: 30-Minute Points Calculator Cron

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  calculate_points:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Calculate Points API
        run: |
          curl -X GET "${{ secrets.CRON_URL }}/api/calculate-points" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
